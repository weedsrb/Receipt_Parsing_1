encoding: utf-16
currency: "$"
date_format: "%d/%m/%Y"

types:
  float:
    - paid amount
    - cash
    - total
    - price

  int:
    - quantity
    - items count
    - order no.

date_time:
  - pattern: '(\d{1,2}[/.-]\d{1,2}[-./]\d{4})'
    field: "date"

  - pattern: '(\d{2}:\d{2}:\d{2}\s*(?:[APap][Mm])?)'
    field: "time"

items:
  separator: "x"
  pattern: '(\d+)\s+{separator}\s+{currency}(\d+\.\d{{2}})'